name: ci-cd

# Trigger this workflow on pull requests targeting main, and on direct pushes to main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # First job: lint the code and run tests 
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code so the workflow can access it
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install Go 1.22 and enable module caching to speed up future runs
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # Run golangci-lint to catch style issues, bugs, and other code problems
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      # Run all Go tests in the project
      - name: Run tests
        run: go test ./...

  # Second job: build and publish the Docker image — only runs after lint-and-test passes
  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test # Wait for lint-and-test to succeed before running this job
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only run on pushes to main, not on pull requests

    steps:
      # Check out the repository code again (each job gets a fresh runner)
      - name: Checkout repo
        uses: actions/checkout@v4

      # Authenticate with Docker Hub using stored credentials
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up Docker Buildx, which supports advanced build features like multi-platform images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the Docker image from the repo root and push it to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # Use the repo root as the build context (where the Dockerfile lives)
          push: true
          tags: wangjialin2/prep_1:latest # Tag the image as "latest" on Docker Hub
